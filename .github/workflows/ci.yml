name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  zenith-math:
    name: zenith-math (fmt, clippy, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt -p zenith-math -- --check

      - name: Clippy
        run: cargo clippy -p zenith-math --all-targets -- -D warnings

      - name: Test
        run: cargo test -p zenith-math

  zenith-amm:
    name: zenith-amm (fmt, build, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt -p zenith-amm -- --check

      # Host build + unit tests (account model, PDAs). BPF build / on-chain
      # integration tests require the Solana + Anchor toolchain and land later.
      # clippy -D warnings is deferred: the Anchor macros emit unavoidable
      # deprecation / cfg warnings from the program entrypoint expansion.
      - name: Build
        run: cargo build -p zenith-amm

      - name: Test
        run: cargo test -p zenith-amm
