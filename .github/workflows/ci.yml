name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  zenith-math:
    name: zenith-math (fmt, clippy, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt -p zenith-math -- --check

      - name: Clippy
        run: cargo clippy -p zenith-math --all-targets -- -D warnings

      - name: Test
        run: cargo test -p zenith-math

  zenith-amm:
    name: zenith-amm (fmt, build, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt -p zenith-amm -- --check

      # Host build + unit/prop tests (math, account model, PDAs, swap step).
      # The on-chain integration test lives in the separate `amm-integration`
      # crate and is NOT run here: it needs the BPF .so + the heavy
      # solana-program-test runtime, so it stays local-only
      # (`cargo build-sbf` then `cargo test -p amm-integration`). Scoping to
      # `-p zenith-amm` keeps CI from ever compiling those deps. clippy -D
      # warnings is deferred: the Anchor macros emit unavoidable deprecation /
      # cfg warnings from the entrypoint.
      - name: Build
        run: cargo build -p zenith-amm

      - name: Test
        run: cargo test -p zenith-amm

  sdk:
    name: sdk (lint, test, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: sdk/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
