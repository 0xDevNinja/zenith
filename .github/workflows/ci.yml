name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  zenith-math:
    name: zenith-math (fmt, clippy, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt -p zenith-math -- --check

      - name: Clippy
        run: cargo clippy -p zenith-math --all-targets -- -D warnings

      - name: Test
        run: cargo test -p zenith-math
